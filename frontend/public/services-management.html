<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>إدارة الخدمات - صنهاجة للسياحة والسفر</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }
        .card-content {
            padding: 20px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-outline {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
        }
        .btn-outline:hover {
            background: #f9fafb;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .table th, .table td {
            border: 1px solid #e5e7eb;
            padding: 8px;
            text-align: right;
        }
        .table th {
            background: #f9fafb;
            font-weight: 600;
        }
        .table tr:hover {
            background: #f9fafb;
        }
        .status-active {
            background: #dcfce7;
            color: #166534;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .status-inactive {
            background: #fee2e2;
            color: #991b1b;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .loading {
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .selected-count {
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            margin: 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        
        const API = 'https://travel-ops-manager.preview.emergentagent.com';

        // Get auth token from localStorage or sessionStorage
        const getAuthToken = () => {
            return localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
        };

        // Set up axios defaults
        axios.defaults.headers.common['Authorization'] = `Bearer ${getAuthToken()}`;

        const ServicesManagement = () => {
            const [loading, setLoading] = useState(false);
            const [services, setServices] = useState([]);
            const [selectedServices, setSelectedServices] = useState(new Set());
            const [includeInactive, setIncludeInactive] = useState(true);
            const [bulkAction, setBulkAction] = useState('');
            const [showConfirmDialog, setShowConfirmDialog] = useState(false);
            const [confirmAction, setConfirmAction] = useState(null);

            // Fetch services
            const fetchServices = useCallback(async () => {
                try {
                    setLoading(true);
                    const params = new URLSearchParams();
                    params.append('include_inactive', includeInactive);
                    
                    const response = await axios.get(`${API}/api/services/management?${params.toString()}`);
                    setServices(response.data.services || []);
                } catch (error) {
                    console.error('Error fetching services:', error);
                    alert('خطأ في تحميل الخدمات: ' + (error.response?.data?.detail || error.message));
                } finally {
                    setLoading(false);
                }
            }, [includeInactive]);

            useEffect(() => {
                fetchServices();
            }, [fetchServices]);

            // Handle select all/none
            const handleSelectAll = () => {
                if (selectedServices.size === services.length) {
                    setSelectedServices(new Set());
                } else {
                    setSelectedServices(new Set(services.map(s => s.id)));
                }
            };

            // Handle individual service selection
            const handleServiceSelect = (serviceId) => {
                const newSelected = new Set(selectedServices);
                if (newSelected.has(serviceId)) {
                    newSelected.delete(serviceId);
                } else {
                    newSelected.add(serviceId);
                }
                setSelectedServices(newSelected);
            };

            // Handle bulk delete
            const handleBulkDelete = async () => {
                try {
                    setLoading(true);
                    const serviceIds = Array.from(selectedServices);
                    
                    const response = await axios.delete(`${API}/api/services/bulk-delete`, {
                        data: { service_ids: serviceIds }
                    });
                    
                    alert(`✅ تم حذف ${response.data.deleted_count} خدمة بنجاح`);
                    setSelectedServices(new Set());
                    fetchServices();
                } catch (error) {
                    console.error('Error deleting services:', error);
                    alert('❌ خطأ في حذف الخدمات: ' + (error.response?.data?.detail || error.message));
                } finally {
                    setLoading(false);
                    setShowConfirmDialog(false);
                }
            };

            // Handle bulk status update
            const handleBulkStatusUpdate = async (isActive) => {
                try {
                    setLoading(true);
                    const serviceIds = Array.from(selectedServices);
                    
                    const response = await axios.patch(`${API}/api/services/bulk-update-status`, {
                        service_ids: serviceIds,
                        is_active: isActive
                    });
                    
                    const statusText = isActive ? 'تفعيل' : 'إلغاء تفعيل';
                    alert(`✅ تم ${statusText} ${response.data.updated_count} خدمة بنجاح`);
                    setSelectedServices(new Set());
                    fetchServices();
                } catch (error) {
                    console.error('Error updating services status:', error);
                    alert('❌ خطأ في تحديث حالة الخدمات: ' + (error.response?.data?.detail || error.message));
                } finally {
                    setLoading(false);
                    setShowConfirmDialog(false);
                }
            };

            // Execute bulk action
            const executeBulkAction = () => {
                if (selectedServices.size === 0) {
                    alert('⚠️ يرجى تحديد خدمة واحدة على الأقل');
                    return;
                }

                if (bulkAction === 'delete') {
                    setConfirmAction(() => handleBulkDelete);
                    setShowConfirmDialog(true);
                } else if (bulkAction === 'activate') {
                    setConfirmAction(() => () => handleBulkStatusUpdate(true));
                    setShowConfirmDialog(true);
                } else if (bulkAction === 'deactivate') {
                    setConfirmAction(() => () => handleBulkStatusUpdate(false));
                    setShowConfirmDialog(true);
                }
            };

            // Format currency
            const formatCurrency = (amount) => {
                return `${(amount || 0).toLocaleString()} دج`;
            };

            if (loading) {
                return (
                    <div className="loading">
                        <div className="spinner"></div>
                    </div>
                );
            }

            return (
                <div className="container">
                    {/* Header */}
                    <div className="card">
                        <div className="card-header">
                            <h1 style={{fontSize: '24px', fontWeight: 'bold', margin: 0}}>
                                🛠️ إدارة الخدمات الجماعية
                            </h1>
                            <p style={{color: '#6b7280', margin: '8px 0 0 0', fontSize: '14px'}}>
                                إدارة شاملة للخدمات مع إمكانية التحديد والحذف والتفعيل - cocher ou décocher
                            </p>
                        </div>
                        <div className="card-content">
                            <button className="btn btn-outline" onClick={fetchServices}>
                                🔄 تحديث
                            </button>
                        </div>
                    </div>

                    {/* Statistics Cards */}
                    <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '16px', marginBottom: '20px'}}>
                        <div className="card" style={{background: 'linear-gradient(135deg, #3b82f6, #6366f1)', color: 'white'}}>
                            <div className="card-content">
                                <div style={{display: 'flex', alignItems: 'center'}}>
                                    <span style={{fontSize: '32px', marginLeft: '12px'}}>⚙️</span>
                                    <div>
                                        <p style={{fontSize: '14px', opacity: 0.9, margin: 0}}>إجمالي الخدمات</p>
                                        <p style={{fontSize: '24px', fontWeight: 'bold', margin: 0}}>{services.length}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="card" style={{background: 'linear-gradient(135deg, #10b981, #059669)', color: 'white'}}>
                            <div className="card-content">
                                <div style={{display: 'flex', alignItems: 'center'}}>
                                    <span style={{fontSize: '32px', marginLeft: '12px'}}>✅</span>
                                    <div>
                                        <p style={{fontSize: '14px', opacity: 0.9, margin: 0}}>الخدمات النشطة</p>
                                        <p style={{fontSize: '24px', fontWeight: 'bold', margin: 0}}>{services.filter(s => s.is_active).length}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="card" style={{background: 'linear-gradient(135deg, #f59e0b, #d97706)', color: 'white'}}>
                            <div className="card-content">
                                <div style={{display: 'flex', alignItems: 'center'}}>
                                    <span style={{fontSize: '32px', marginLeft: '12px'}}>❌</span>
                                    <div>
                                        <p style={{fontSize: '14px', opacity: 0.9, margin: 0}}>الخدمات غير النشطة</p>
                                        <p style={{fontSize: '24px', fontWeight: 'bold', margin: 0}}>{services.filter(s => !s.is_active).length}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Controls */}
                    <div className="card">
                        <div className="card-header">
                            <h3 style={{margin: 0, display: 'flex', alignItems: 'center'}}>
                                <span style={{marginLeft: '8px'}}>🔍</span>
                                أدوات التحكم
                            </h3>
                        </div>
                        <div className="card-content">
                            <div style={{display: 'flex', flexWrap: 'wrap', gap: '16px', alignItems: 'center'}}>
                                {/* Include Inactive Toggle */}
                                <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                                    <label style={{fontSize: '14px', fontWeight: '500'}}>عرض الخدمات غير النشطة:</label>
                                    <input
                                        type="checkbox"
                                        checked={includeInactive}
                                        onChange={(e) => setIncludeInactive(e.target.checked)}
                                        style={{borderRadius: '4px'}}
                                    />
                                </div>

                                {/* Select All/None */}
                                <button
                                    className="btn btn-outline"
                                    onClick={handleSelectAll}
                                >
                                    {selectedServices.size === services.length ? 'إلغاء تحديد الكل' : 'تحديد الكل'}
                                </button>

                                {/* Selected Count */}
                                {selectedServices.size > 0 && (
                                    <span className="selected-count">
                                        تم تحديد {selectedServices.size} خدمة
                                    </span>
                                )}

                                {/* Bulk Actions */}
                                {selectedServices.size > 0 && (
                                    <div style={{display: 'flex', gap: '8px'}}>
                                        <select 
                                            value={bulkAction} 
                                            onChange={(e) => setBulkAction(e.target.value)}
                                            style={{padding: '8px', border: '1px solid #d1d5db', borderRadius: '6px', width: '200px'}}
                                        >
                                            <option value="">اختر إجراء جماعي</option>
                                            <option value="activate">✅ تفعيل المحدد</option>
                                            <option value="deactivate">❌ إلغاء تفعيل المحدد</option>
                                            <option value="delete">🗑️ حذف المحدد</option>
                                        </select>

                                        <button 
                                            className="btn btn-primary"
                                            onClick={executeBulkAction}
                                            disabled={!bulkAction}
                                        >
                                            تنفيذ
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Services Table */}
                    <div className="card">
                        <div className="card-header">
                            <h3 style={{margin: 0}}>قائمة الخدمات ({services.length})</h3>
                        </div>
                        <div className="card-content">
                            {services.length === 0 ? (
                                <div style={{textAlign: 'center', padding: '32px'}}>
                                    <div style={{fontSize: '64px', marginBottom: '16px'}}>⚙️</div>
                                    <h3 style={{fontSize: '18px', fontWeight: '500', color: '#111827', marginBottom: '8px'}}>لا توجد خدمات</h3>
                                    <p style={{color: '#6b7280'}}>لم يتم العثور على خدمات تطابق المعايير المحددة</p>
                                </div>
                            ) : (
                                <div style={{overflowX: 'auto'}}>
                                    <table className="table">
                                        <thead>
                                            <tr>
                                                <th style={{textAlign: 'center'}}>
                                                    <input
                                                        type="checkbox"
                                                        checked={selectedServices.size === services.length && services.length > 0}
                                                        onChange={handleSelectAll}
                                                        style={{borderRadius: '4px'}}
                                                    />
                                                </th>
                                                <th>اسم الخدمة</th>
                                                <th>النوع</th>
                                                <th>الفئة</th>
                                                <th>السعر الأساسي</th>
                                                <th style={{textAlign: 'center'}}>الحالة</th>
                                                <th style={{textAlign: 'center'}}>عدد العمليات</th>
                                                <th>إجمالي الإيرادات</th>
                                                <th>آخر استخدام</th>
                                                <th style={{textAlign: 'center'}}>يمكن حذفها</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {services.map((service) => (
                                                <tr key={service.id}>
                                                    <td style={{textAlign: 'center'}}>
                                                        <input
                                                            type="checkbox"
                                                            checked={selectedServices.has(service.id)}
                                                            onChange={() => handleServiceSelect(service.id)}
                                                            style={{borderRadius: '4px'}}
                                                        />
                                                    </td>
                                                    <td style={{fontWeight: '500'}}>{service.name}</td>
                                                    <td>{service.service_type}</td>
                                                    <td>{service.category}</td>
                                                    <td style={{color: '#059669', fontWeight: '600'}}>
                                                        {formatCurrency(service.base_price)}
                                                    </td>
                                                    <td style={{textAlign: 'center'}}>
                                                        <span className={service.is_active ? 'status-active' : 'status-inactive'}>
                                                            {service.is_active ? '✅ نشط' : '❌ غير نشط'}
                                                        </span>
                                                    </td>
                                                    <td style={{textAlign: 'center', fontWeight: '600'}}>
                                                        {service.usage_stats?.operations_count || 0}
                                                    </td>
                                                    <td style={{color: '#3b82f6', fontWeight: '600'}}>
                                                        {formatCurrency(service.usage_stats?.total_revenue || 0)}
                                                    </td>
                                                    <td>
                                                        {service.usage_stats?.last_used 
                                                            ? new Date(service.usage_stats.last_used).toLocaleDateString('ar-SA')
                                                            : 'لم تُستخدم بعد'
                                                        }
                                                    </td>
                                                    <td style={{textAlign: 'center'}}>
                                                        {service.usage_stats?.can_delete ? (
                                                            <span style={{color: '#059669'}}>✅ نعم</span>
                                                        ) : (
                                                            <span style={{color: '#dc2626'}}>❌ لا</span>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Confirmation Dialog */}
                    {showConfirmDialog && (
                        <div className="modal">
                            <div className="modal-content">
                                <h3 style={{fontSize: '18px', fontWeight: '600', marginBottom: '16px'}}>تأكيد الإجراء</h3>
                                <p style={{color: '#6b7280', marginBottom: '24px'}}>
                                    هل أنت متأكد من تنفيذ هذا الإجراء على {selectedServices.size} خدمة محددة؟
                                    {bulkAction === 'delete' && (
                                        <span style={{display: 'block', color: '#dc2626', fontWeight: '500', marginTop: '8px'}}>
                                            ⚠️ تحذير: هذا الإجراء لا يمكن التراجع عنه!
                                        </span>
                                    )}
                                </p>
                                <div style={{display: 'flex', gap: '16px'}}>
                                    <button 
                                        className={`btn ${bulkAction === 'delete' ? 'btn-danger' : 'btn-primary'}`}
                                        onClick={confirmAction}
                                        disabled={loading}
                                    >
                                        {loading ? 'جاري التنفيذ...' : 'تأكيد'}
                                    </button>
                                    <button 
                                        className="btn btn-outline"
                                        onClick={() => setShowConfirmDialog(false)}
                                        disabled={loading}
                                    >
                                        إلغاء
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ServicesManagement />);
    </script>
</body>
</html>
